<div class="container mt-4">
  <div class="card p-3 mb-4 shadow-sm border-primary">
    <div class="row g-2">
      <div class="col-md-4"><input [(ngModel)]="nuevoProveedor.nombre" class="form-control" placeholder="Nombre Empresa"></div>
      <div class="col-md-4"><input [(ngModel)]="nuevoProveedor.contacto" class="form-control" placeholder="Nombre Contacto"></div>
      <div class="col-md-2"><input [(ngModel)]="nuevoProveedor.telefono" class="form-control" placeholder="Teléfono"></div>
      <div class="col-md-2">
        <button (click)="registrar()" [class]="editando ? 'btn btn-info w-100 fw-bold' : 'btn btn-primary w-100 fw-bold'">
          {{ editando ? 'ACTUALIZAR' : 'GUARDAR' }}
        </button>
      </div>
      <div class="col-md-5"><input [(ngModel)]="nuevoProveedor.email" class="form-control" placeholder="Email"></div>
      <div class="col-md-5"><input [(ngModel)]="nuevoProveedor.direccion" class="form-control" placeholder="Dirección"></div>
      <div class="col-md-2" *ngIf="editando">
        <button (click)="resetForm()" class="btn btn-secondary w-100">CANCELAR</button>
      </div>
    </div>
  </div>

  <table class="table table-bordered table-hover text-center">
    <thead class="table-dark">
      <tr>
        <th>Empresa</th>
        <th>Contacto</th>
        <th>Telefono</th>
        <th>Email</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of listaProveedores()">
        <td>{{ p.nombre }}</td>
        <td>{{ p.contacto }}</td>
        <td>{{ p.telefono }}</td>
        <td>{{ p.email }}</td>
        <td>
          <button (click)="prepararEdicion(p)" class="btn btn-sm btn-outline-primary me-1">Editar</button>
          <button (click)="eliminar(p.id)" class="btn btn-sm btn-outline-danger">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
