<div class="container mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Registrar Un Nuevo Usuario</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" class="form-control" [(ngModel)]="nuevoUsuario.nombre">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Correo</label>
            <input type="email" class="form-control" [(ngModel)]="nuevoUsuario.email">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Contraseña</label>
            <input type="password" class="form-control" [(ngModel)]="nuevoUsuario.password">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Rol</label>
            <select class="form-select" [(ngModel)]="nuevoUsuario.rol">
              <option value="empleado">Empleado</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <button class="btn btn-warning w-100 fw-bold" (click)="registrar()">GUARDAR USUARIO</button>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">Usuarios en el Sistema</h5>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let u of listaUsuarios">
                <td>{{u.nombre}}</td>
                <td>{{u.email}}</td>
                <td><span class="badge" [ngClass]="u.rol === 'admin' ? 'bg-danger' : 'bg-info'">{{u.rol}}</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
